<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Viewer</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<style>
body { margin: 0; overflow: hidden; }

#info {
  position: absolute;
  top: 10px;
  left: 10px;
  background: white;
  padding: 6px 10px;
  border-radius: 6px;
  font-family: Arial;
  z-index: 10;
}

/* 🔥 большой слайдер */
#clipSlider {
  position: absolute;
  bottom: 20px;
  left: 20px;
  width: 80vw;
  max-width: 400px;
  height: 40px;
  z-index: 10;
}

#clipSlider::-webkit-slider-runnable-track {
  height: 8px;
  border-radius: 4px;
  background: #ccc;
}

#clipSlider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #333;
  margin-top: -10px;
  cursor: pointer;
}

#clipSlider::-moz-range-track {
  height: 8px;
  border-radius: 4px;
  background: #ccc;
}

#clipSlider::-moz-range-thumb {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #333;
  cursor: pointer;
}

/* 🔁 кнопка инверсии */
#invertBtn {
  position: absolute;
  bottom: 80px;
  left: 20px;
  padding: 10px 14px;
  background: white;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-family: Arial;
  cursor: pointer;
  z-index: 10;
}

/* 📐 выбор плоскости */
#planeSelect {
  position: absolute;
  bottom: 130px;
  left: 20px;
  padding: 8px;
  z-index: 10;
}
</style>

</head>
<body>

<div id="info">Загрузка...</div>

<select id="planeSelect">
  <option value="xy">XY</option>
  <option value="xz">XZ</option>
  <option value="yz">YZ</option>
</select>

<button id="invertBtn">Инверсия</button>
<input type="range" id="clipSlider" min="-100" max="100" value="0">

<script type="module">

import * as THREE from 'three';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

// =========================
// 📥 читаем модель из URL
// =========================

const params = new URLSearchParams(window.location.search);
let modelFile = params.get("model") || "default.glb";

document.getElementById("info").innerText = modelFile;

// =========================
// 🎬 сцена
// =========================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  100000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.localClippingEnabled = true;

document.body.appendChild(renderer.domElement);

// свет
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));

const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

// управление
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// =========================
// ✂️ плоскость разреза
// =========================

const plane = new THREE.Plane(new THREE.Vector3(1, 0, 0), 0);

// 📐 выбор плоскости
const planeSelect = document.getElementById("planeSelect");

planeSelect.addEventListener("change", (e) => {
  const val = e.target.value;

  if (val === "xy") plane.normal.set(0, 0, 1); // режем по Z
  if (val === "xz") plane.normal.set(0, 1, 0); // режем по Y
  if (val === "yz") plane.normal.set(1, 0, 0); // режем по X
});

// 🔁 инверсия
const invertBtn = document.getElementById("invertBtn");

invertBtn.addEventListener("click", () => {
  plane.normal.multiplyScalar(-1);
  plane.constant *= -1;
});

// 🎚 слайдер
const slider = document.getElementById("clipSlider");
slider.addEventListener("input", (e) => {
  plane.constant = Number(e.target.value);
});

// =========================
// 📦 загрузка GLB
// =========================

const loader = new GLTFLoader();
const modelPath = modelFile;

loader.load(modelPath, function (gltf) {

  const model = gltf.scene;
  scene.add(model);

  model.traverse((child) => {
    if (child.isMesh) {
      child.material.clippingPlanes = [plane];
      child.material.clipShadows = true;
    }
  });

  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());

  model.position.sub(center);

  const maxDim = Math.max(size.x, size.y, size.z);
  const halfSize = maxDim / 2;

  slider.min = -halfSize;
  slider.max = halfSize;
  slider.step = maxDim / 200;
  slider.value = 0;

  camera.position.set(
    maxDim * 2,
    maxDim * 2,
    maxDim * 2
  );

  camera.lookAt(0, 0, 0);

  document.getElementById("info").innerText = modelFile;

}, undefined, function (error) {
  console.error("Ошибка загрузки:", error);
  document.getElementById("info").innerText = "Ошибка загрузки модели";
});

// =========================
// 🔄 анимация
// =========================

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// =========================
// 📱 ресайз
// =========================

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
