<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Viewer</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<style>
body { margin: 0; overflow: hidden; }

#info {
  position: absolute;
  top: 10px;
  left: 10px;
  background: white;
  padding: 6px 10px;
  border-radius: 6px;
  font-family: Arial;
  z-index: 10;
}

/* 🎛️ панель */
#controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  z-index: 10;
}

/* селекты и кнопки */
#planeSelect, #renderMode {
  padding: 10px;
  font-size: 16px;
}

#invertBtn {
  padding: 10px 16px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
}

/* слайдер */
#clipSlider {
  width: 90vw;
  max-width: 500px;
  height: 50px;
}

#clipSlider::-webkit-slider-runnable-track {
  height: 10px;
  background: #ccc;
  border-radius: 5px;
}

#clipSlider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 32px;
  height: 32px;
  background: #333;
  border-radius: 50%;
  margin-top: -11px;
}

#clipSlider::-moz-range-thumb {
  width: 32px;
  height: 32px;
  background: #333;
  border-radius: 50%;
}
</style>

</head>
<body>

<div id="info">Загрузка...</div>

<div id="controls">
  <select id="planeSelect">
    <option value="xy">XY</option>
    <option value="xz">XZ</option>
    <option value="yz">YZ</option>
  </select>

  <select id="renderMode">
    <option value="solid">Обычный</option>
    <option value="edges">С гранями</option>
    <option value="wireframe">Каркас</option>
  </select>

  <button id="invertBtn">Инверсия</button>

  <input type="range" id="clipSlider">
</div>

<script type="module">

import * as THREE from 'three';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

// URL
const params = new URLSearchParams(window.location.search);
let modelFile = params.get("model") || "default.glb";
document.getElementById("info").innerText = modelFile;

// сцена
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.localClippingEnabled = true;

document.body.appendChild(renderer.domElement);

// 💡 улучшенный свет
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight1.position.set(5,10,7);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
dirLight2.position.set(-5,-10,-7);
scene.add(dirLight2);

// управление
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// ✂️ плоскость
const plane = new THREE.Plane(new THREE.Vector3(0,0,1), 0);

// UI
const planeSelect = document.getElementById("planeSelect");
const slider = document.getElementById("clipSlider");
const renderMode = document.getElementById("renderMode");

// синхронизация
planeSelect.value = "xy";

// смена плоскости
planeSelect.addEventListener("change", (e)=>{
  const v = e.target.value;

  if (v === "xy") plane.normal.set(0,0,1);
  if (v === "xz") plane.normal.set(0,1,0);
  if (v === "yz") plane.normal.set(1,0,0);
});

// инверсия
document.getElementById("invertBtn").addEventListener("click", ()=>{
  plane.normal.multiplyScalar(-1);
  plane.constant *= -1;
});

// слайдер
slider.addEventListener("input", (e)=>{
  plane.constant = Number(e.target.value);
});

// загрузка
const loader = new GLTFLoader();

loader.load(modelFile, (gltf)=>{

  const model = gltf.scene;
  scene.add(model);

  // список мешей
  const meshes = [];

  model.traverse((child)=>{
    if (child.isMesh){

      child.material.clippingPlanes = [plane];

      meshes.push(child);

      // добавляем грани
      const edges = new THREE.EdgesGeometry(child.geometry);
      const line = new THREE.LineSegments(
        edges,
        new THREE.LineBasicMaterial({ color: 0x000000 })
      );

      line.visible = false;
      child.add(line);
      child.userData.edgeLines = line;
    }
  });

  // режим отображения
  renderMode.addEventListener("change", (e)=>{
    const mode = e.target.value;

    meshes.forEach(mesh => {

      if (mode === "solid") {
        mesh.material.wireframe = false;
        if (mesh.userData.edgeLines) mesh.userData.edgeLines.visible = false;
      }

      if (mode === "edges") {
        mesh.material.wireframe = false;
        if (mesh.userData.edgeLines) mesh.userData.edgeLines.visible = true;
      }

      if (mode === "wireframe") {
        mesh.material.wireframe = true;
        if (mesh.userData.edgeLines) mesh.userData.edgeLines.visible = false;
      }

    });
  });

  // центрирование
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());

  model.position.sub(center);

  const maxDim = Math.max(size.x,size.y,size.z);
  const halfSize = maxDim/2;

  slider.min = -halfSize;
  slider.max = halfSize;
  slider.step = maxDim/200;
  slider.value = 0;

  camera.position.set(maxDim*2,maxDim*2,maxDim*2);
  camera.lookAt(0,0,0);

});

// анимация
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();

// ресайз
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
