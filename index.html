<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Viewer</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<style>
body { margin: 0; overflow: hidden; }

#info {
  position: absolute;
  top: 10px;
  left: 10px;
  background: white;
  padding: 6px 10px;
  border-radius: 6px;
  font-family: Arial;
  z-index: 10;
}

#controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  z-index: 10;
}

#controls select,
#controls button {
  padding: 10px;
  font-size: 16px;
}

#clipSlider {
  width: 90vw;
  max-width: 500px;
  height: 50px;
}
</style>

</head>
<body>

<div id="info">Загрузка...</div>

<div id="controls">

  <select id="planeSelect">
    <option value="xy">XY</option>
    <option value="xz">XZ</option>
    <option value="yz">YZ</option>
  </select>

  <select id="renderMode">
    <option value="solid">Обычный</option>
    <option value="edges">С гранями</option>
    <option value="wireframe">Каркас</option>
  </select>

  <label>
    <input type="checkbox" id="planeToggle">
    Отобразить плоскость
  </label>

  <button id="invertBtn">Инверсия</button>

  <input type="range" id="clipSlider">

</div>

<script type="module">

import * as THREE from 'three';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

// URL
const params = new URLSearchParams(window.location.search);
let modelFile = params.get("model") || "default.glb";
document.getElementById("info").innerText = modelFile;

// сцена
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

// камера (только перспектива)
const camera = new THREE.PerspectiveCamera(
  75, window.innerWidth/window.innerHeight, 0.1, 100000
);

// renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.localClippingEnabled = true;

document.body.appendChild(renderer.domElement);

// свет
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const dir1 = new THREE.DirectionalLight(0xffffff, 0.8);
dir1.position.set(5,10,7);
scene.add(dir1);

const dir2 = new THREE.DirectionalLight(0xffffff, 0.5);
dir2.position.set(-5,-10,-7);
scene.add(dir2);

// управление
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ✂️ плоскость (по умолчанию XY)
const plane = new THREE.Plane(new THREE.Vector3(0,0,1), 0);

// 🔲 визуальная плоскость (пока пустая)
let planeMesh = null;

// UI
const planeSelect = document.getElementById("planeSelect");
const slider = document.getElementById("clipSlider");
const renderMode = document.getElementById("renderMode");

planeSelect.value = "xy";

// смена плоскости
planeSelect.addEventListener("change", (e)=>{
  const v = e.target.value;

  if (v === "xy") plane.normal.set(0,0,1);
  if (v === "xz") plane.normal.set(0,1,0);
  if (v === "yz") plane.normal.set(1,0,0);
});

// инверсия
document.getElementById("invertBtn").addEventListener("click", ()=>{
  plane.normal.multiplyScalar(-1);
  plane.constant *= -1;
});

// слайдер
slider.addEventListener("input", (e)=>{
  plane.constant = Number(e.target.value);
});

// toggle плоскости
document.getElementById("planeToggle").addEventListener("change", (e)=>{
  if (planeMesh) planeMesh.visible = e.target.checked;
});

// загрузка
const loader = new GLTFLoader();

loader.load(modelFile, (gltf)=>{

  const model = gltf.scene;
  scene.add(model);

  const meshes = [];

  model.traverse((child)=>{
    if (child.isMesh){

      child.material.clippingPlanes = [plane];
      meshes.push(child);

      const edges = new THREE.EdgesGeometry(child.geometry);
      const line = new THREE.LineSegments(
        edges,
        new THREE.LineBasicMaterial({ color: 0x000000 })
      );

      line.visible = false;
      child.add(line);
      child.userData.edgeLines = line;
    }
  });

  renderMode.addEventListener("change", (e)=>{
    const mode = e.target.value;

    meshes.forEach(mesh=>{
      mesh.material.wireframe = (mode === "wireframe");
      if (mesh.userData.edgeLines)
        mesh.userData.edgeLines.visible = (mode === "edges");
    });
  });

  // 📦 размеры модели
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());

  model.position.sub(center);

  const maxDim = Math.max(size.x,size.y,size.z);
  const halfSize = maxDim/2;

  // 🔥 создаём ПРАВИЛЬНУЮ плоскость
  const planeSize = maxDim * 1.2;

  planeMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(planeSize, planeSize),
    new THREE.MeshBasicMaterial({
      color: 0x00aaff,
      transparent: true,
      opacity: 0.15,
      side: THREE.DoubleSide
    })
  );

  planeMesh.visible = false;
  scene.add(planeMesh);

  // слайдер
  slider.min = -halfSize;
  slider.max = halfSize;
  slider.step = maxDim / 200;

  camera.position.set(maxDim*2,maxDim*2,maxDim*2);
  camera.lookAt(0,0,0);

});

// анимация
function animate(){
  requestAnimationFrame(animate);

  if (planeMesh){
    planeMesh.position.copy(plane.normal).multiplyScalar(-plane.constant);
    planeMesh.lookAt(plane.normal);
  }

  controls.update();
  renderer.render(scene,camera);
}
animate();

// ресайз
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
