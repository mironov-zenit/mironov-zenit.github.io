<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Viewer</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<style>
body { margin: 0; overflow: hidden; }
#info {
  position: absolute;
  top: 10px;
  left: 10px;
  background: white;
  padding: 6px 10px;
  border-radius: 6px;
  font-family: Arial;
  z-index: 10;
}
</style>

</head>
<body>

<div id="info">Загрузка...</div>

<script type="module">

import * as THREE from 'three';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

// =========================
// 📥 читаем модель из URL
// =========================

const params = new URLSearchParams(window.location.search);
let modelFile = params.get("model") || "default.glb";

document.getElementById("info").innerText = modelFile;

// =========================
// 🎬 сцена
// =========================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  100000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace; // 🔥 важно для цветов
document.body.appendChild(renderer.domElement);

// свет
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));

const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

// управление
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// =========================
// 📦 загрузка GLB
// =========================

const loader = new GLTFLoader();
const modelPath = modelFile;

loader.load(modelPath, function (gltf) {

  const model = gltf.scene;
  scene.add(model);

  // центрирование
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());

  model.position.sub(center);

  const maxDim = Math.max(size.x, size.y, size.z);

  camera.position.set(
    maxDim * 2,
    maxDim * 2,
    maxDim * 2
  );

  camera.lookAt(0, 0, 0);

  document.getElementById("info").innerText = modelFile;

}, undefined, function (error) {
  console.error("Ошибка загрузки:", error);
  document.getElementById("info").innerText = "Ошибка загрузки модели";
});

// =========================
// 🔄 анимация
// =========================

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// =========================
// 📱 ресайз
// =========================

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
