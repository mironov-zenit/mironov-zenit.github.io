<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Viewer</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<style>
body { margin: 0; overflow: hidden; }

#info {
  position: absolute;
  top: 10px;
  left: 10px;
  background: white;
  padding: 6px 10px;
  border-radius: 6px;
  font-family: Arial;
  z-index: 10;
}

/* 🎛️ общий контейнер управления */
#controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  z-index: 10;
}

/* 📐 селект */
#planeSelect {
  padding: 12px 16px;
  font-size: 16px;
}

/* 🔁 кнопка */
#invertBtn {
  padding: 12px 20px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
}

/* 🔥 огромный слайдер */
#clipSlider {
  width: 90vw;
  max-width: 500px;
  height: 50px;
}

#clipSlider::-webkit-slider-runnable-track {
  height: 10px;
  border-radius: 5px;
  background: #ccc;
}

#clipSlider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #333;
  margin-top: -11px;
}

#clipSlider::-moz-range-track {
  height: 10px;
  border-radius: 5px;
  background: #ccc;
}

#clipSlider::-moz-range-thumb {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #333;
}
</style>

</head>
<body>

<div id="info">Загрузка...</div>

<!-- 🎛️ новый блок управления -->
<div id="controls">
  <select id="planeSelect">
    <option value="xy">XY</option>
    <option value="xz">XZ</option>
    <option value="yz">YZ</option>
  </select>

  <button id="invertBtn">Инверсия</button>

  <input type="range" id="clipSlider" min="-100" max="100" value="0">
</div>

<script type="module">

import * as THREE from 'three';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

// URL
const params = new URLSearchParams(window.location.search);
let modelFile = params.get("model") || "default.glb";
document.getElementById("info").innerText = modelFile;

// сцена
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.localClippingEnabled = true;

document.body.appendChild(renderer.domElement);

// свет
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));

const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5,10,7);
scene.add(dirLight);

// управление
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// ✂️ плоскость (по умолчанию YZ)
const plane = new THREE.Plane(new THREE.Vector3(1,0,0), 0);

// 📐 UI
const planeSelect = document.getElementById("planeSelect");
const slider = document.getElementById("clipSlider");

// 🔥 фикс бага — синхронизация
planeSelect.value = "yz";

// смена плоскости
planeSelect.addEventListener("change", (e)=>{
  const v = e.target.value;

  if (v === "xy") plane.normal.set(0,0,1);
  if (v === "xz") plane.normal.set(0,1,0);
  if (v === "yz") plane.normal.set(1,0,0);
});

// инверсия
document.getElementById("invertBtn").addEventListener("click", ()=>{
  plane.normal.multiplyScalar(-1);
  plane.constant *= -1;
});

// слайдер
slider.addEventListener("input", (e)=>{
  plane.constant = Number(e.target.value);
});

// загрузка
const loader = new GLTFLoader();

loader.load(modelFile, (gltf)=>{

  const model = gltf.scene;
  scene.add(model);

  model.traverse((child)=>{
    if (child.isMesh){
      child.material.clippingPlanes = [plane];
    }
  });

  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());

  model.position.sub(center);

  const maxDim = Math.max(size.x,size.y,size.z);
  const halfSize = maxDim/2;

  slider.min = -halfSize;
  slider.max = halfSize;
  slider.step = maxDim/200;

  camera.position.set(maxDim*2,maxDim*2,maxDim*2);
  camera.lookAt(0,0,0);

});

// анимация
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();

// ресайз
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
